<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LeadOps Front Desk{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="/">LeadOps Front Desk</a>
      <nav class="main-nav">
        <a href="/#benefits">Benefits</a>
        <a href="/#features">Features</a>
        <a href="/#results">Results</a>
        <a href="/#pricing">Pricing</a>
      </nav>
      <a class="btn btn-primary" href="/book">Book a Demo</a>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>LeadOps Front Desk — AI booking and receptionist platform.</p>
      <p>© 2026 LeadOps AI. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
